<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HALO: Heat-Aware Layout Optimizer — 3D Demo</title>
    <style>
      :root {
        --bg: #FAFAF7;
        --bg-card: #FDFCF9;
        --bg-sunken: #F4F2EC;
        --border: #E8E5DD;
        --text-1: #2C2C2A;
        --text-2: #5F5E5A;
        --text-3: #888780;
        --rack-gray: #B4B2A9;
        --success: #1D9E75;
        --success-bg: #E0F1E8;
        --success-text: #0F6E56;
        --info: #378ADD;
        --info-text: #0C447C;
        --warning: #E89E4F;
        --warning-text: #A86B1A;
        --danger: #E24B4A;
        --danger-bg: #FCE8E8;
        --danger-text: #A32D2D;
        --special: #9747FF;
        --special-text: #5F2DAA;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Pretendard",
          system-ui, sans-serif;
        background: var(--bg);
        color: var(--text-1);
        overflow: hidden;
        height: 100vh;
        display: flex;
        flex-direction: column;
        font-size: 13px;
        font-weight: 400;
        font-variant-numeric: tabular-nums;
      }

      /* === Header === */
      .header {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 20px;
        background: var(--bg-card);
        border-bottom: 0.5px solid var(--border);
      }

      .header h1 {
        font-size: 14px;
        font-weight: 500;
        color: var(--text-1);
        letter-spacing: 0.02em;
      }

      .header h1 .bar {
        color: var(--text-3);
        margin: 0 8px;
        font-weight: 400;
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .header-nav {
        display: flex;
        gap: 4px;
      }
      .header-nav a {
        color: var(--text-2);
        text-decoration: none;
        font-size: 12px;
        padding: 6px 12px;
        border-radius: 6px;
        border: 0.5px solid transparent;
      }
      .header-nav a:hover {
        color: var(--text-1);
        background: var(--bg-sunken);
      }
      .header-nav a.active {
        color: var(--text-1);
        border-color: var(--border);
        background: var(--bg-sunken);
      }

      /* === Layout === */
      .layout {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
      }

      /* === Split Viewport === */
      .split-viewport {
        flex: 1;
        min-height: 0;
        display: flex;
      }

      .viewport {
        flex: 1;
        position: relative;
        min-width: 0;
        overflow: hidden;
        background: var(--bg);
      }

      .viewport + .viewport {
        border-left: 1px solid var(--border);
      }

      .viewport canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
      }

      /* === Viewport Label === */
      .viewport-label {
        position: absolute;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--bg-card);
        border: 0.5px solid var(--border);
        border-radius: 20px;
        padding: 5px 16px;
        font-size: 12px;
        font-weight: 500;
        z-index: 10;
        white-space: nowrap;
        display: flex;
        align-items: center;
        gap: 10px;
        box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      }

      .vl-step {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 600;
        flex-shrink: 0;
      }

      .vl-step.random {
        background: var(--danger-bg);
        color: var(--danger-text);
        border: 1px solid var(--danger);
      }

      .vl-step.rl {
        background: var(--success-bg);
        color: var(--success-text);
        border: 1px solid var(--success);
      }


      /* === Temperature Readout (floats below 3D view) === */
      .temp-readout {
        position: absolute;
        bottom: 14px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--bg-card);
        border: 0.5px solid var(--border);
        border-radius: 20px;
        padding: 5px 16px;
        font-size: 12px;
        font-weight: 500;
        color: var(--text-1);
        z-index: 10;
        white-space: nowrap;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
        font-variant-numeric: tabular-nums;
      }

      /* === Bottom Controls Bar === */
      .bottom-bar {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 16px;
        background: var(--bg-card);
        border-top: 0.5px solid var(--border);
      }

      .viewport-controls {
        display: flex;
        gap: 4px;
        padding: 4px;
        background: var(--bg-sunken);
        border: 0.5px solid var(--border);
        border-radius: 8px;
        flex-shrink: 0;
      }

      .viewport-controls button {
        padding: 5px 10px;
        border: 0.5px solid transparent;
        border-radius: 4px;
        background: transparent;
        color: var(--text-2);
        cursor: pointer;
        font-size: 11px;
        font-weight: 500;
        font-family: inherit;
      }

      .viewport-controls button:hover {
        background: var(--bg-card);
        color: var(--text-1);
      }

      .viewport-controls button.active-toggle {
        background: var(--success-bg);
        border-color: var(--success);
        color: var(--success-text);
      }

      /* === Simulation Timeline === */
      .sim-bar {
        flex: 1;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .sim-bar .sim-label {
        font-size: 10px;
        color: var(--text-2);
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        white-space: nowrap;
      }

      .sim-play {
        width: 26px;
        height: 26px;
        border-radius: 6px;
        border: 0.5px solid var(--border);
        background: var(--bg-card);
        color: var(--text-1);
        font-size: 11px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .sim-play:hover {
        background: var(--bg-sunken);
      }

      .sim-slider-wrap {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 2px;
        min-width: 0;
      }

      .sim-time-labels {
        display: flex;
        justify-content: space-between;
        font-size: 9px;
        color: var(--text-3);
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        padding: 0 2px;
      }

      .sim-slider {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 4px;
        border-radius: 2px;
        background: var(--bg-sunken);
        outline: none;
        cursor: pointer;
      }

      .sim-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--text-1);
        cursor: pointer;
        border: 1.5px solid var(--bg-card);
      }

      .sim-slider::-moz-range-thumb {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--text-1);
        cursor: pointer;
        border: 1.5px solid var(--bg-card);
      }

      .sim-clock {
        font-size: 14px;
        font-weight: 500;
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        color: var(--text-1);
        min-width: 50px;
        text-align: center;
        flex-shrink: 0;
      }

      .sim-speed {
        font-size: 10px;
        color: var(--text-2);
        background: var(--bg-card);
        border: 0.5px solid var(--border);
        border-radius: 4px;
        padding: 3px 8px;
        cursor: pointer;
        flex-shrink: 0;
        font-family: inherit;
      }

      .sim-speed:hover {
        background: var(--bg-sunken);
        color: var(--text-1);
      }

      /* === Airflow Zone Legend (bigger) === */
      .airflow-legend {
        position: absolute;
        top: 16px;
        left: 16px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        background: var(--bg-card);
        padding: 12px 18px;
        border-radius: 8px;
        border: 0.5px solid var(--border);
        z-index: 10;
        font-size: 13px;
        color: var(--text-2);
        box-shadow: 0 1px 6px rgba(0,0,0,0.07);
      }

      .af-legend-title {
        font-size: 10px;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--text-3);
        margin-bottom: 2px;
      }

      .af-legend-item {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .af-legend-box {
        width: 18px;
        height: 18px;
        border-radius: 4px;
        border: 0.5px solid;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <!-- Header -->
    <div class="header">
      <h1><span>HALO</span><span class="bar">|</span>Heat-Aware Layout Optimizer</h1>
      <div class="header-right">
        <nav class="header-nav">
          <a href="./index.html" class="active">시나리오</a>
          <a href="./components.html">컴포넌트</a>
          <a href="./dashboard.html">대시보드</a>
          <a href="./scan.html">스캔</a>
        </nav>
      </div>
    </div>

    <div class="layout">
      <!-- Split Viewport: Random (left) | RL (right) -->
      <div class="split-viewport">

        <!-- Left: Random Baseline -->
        <div class="viewport" id="viewport-left">
          <canvas id="canvas-left"></canvas>
          <div class="viewport-label">
            <span class="vl-step random">1</span>
            Random Baseline
          </div>
          <div class="temp-readout" id="temp-left">최고 흡기 —°C</div>
          <!-- Airflow Zone Legend (left viewport only) -->
          <div class="airflow-legend" id="airflow-legend" style="display:none;">
            <div class="af-legend-title">Airflow Zones</div>
            <span class="af-legend-item">
              <span class="af-legend-box" style="background:rgba(55,138,221,0.18);border-color:#378ADD;"></span>
              Cold Air Zone
            </span>
            <span class="af-legend-item">
              <span class="af-legend-box" style="background:rgba(232,158,79,0.20);border-color:#E89E4F;"></span>
              Hot Air Zone
            </span>
            <span class="af-legend-item">
              <span class="af-legend-box" style="background:rgba(226,75,74,0.20);border-color:#E24B4A;"></span>
              Recirculation
            </span>
          </div>
        </div>

        <!-- Right: RL Optimized -->
        <div class="viewport" id="viewport-right">
          <canvas id="canvas-right"></canvas>
          <div class="viewport-label">
            <span class="vl-step rl">2</span>
            RL (PPO) Optimized
          </div>
          <div class="temp-readout" id="temp-right">최고 흡기 —°C</div>
        </div>

      </div>

      <!-- Bottom Controls Bar -->
      <div class="bottom-bar">
        <div class="viewport-controls">
          <button type="button" id="btn-heatmap">Heatmap</button>
          <button type="button" id="btn-airflow">Airflow</button>
          <button type="button" id="btn-zones">Zones</button>
        </div>
        <div class="sim-bar">
          <span class="sim-label">SIM</span>
          <button type="button" class="sim-play" id="sim-play" title="Play/Pause">&#9654;</button>
          <div class="sim-slider-wrap">
            <input type="range" class="sim-slider" id="sim-slider" min="0" max="1440" value="0" step="1" />
            <div class="sim-time-labels">
              <span>0:00</span><span>6:00</span><span>12:00</span><span>18:00</span><span>24:00</span>
            </div>
          </div>
          <div class="sim-clock" id="sim-clock">00:00</div>
          <button type="button" class="sim-speed" id="sim-speed" title="Speed">1x</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

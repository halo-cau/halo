<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HALO: Heat-Aware Layout Optimizer — 3D Demo</title>
    <style>
      :root {
        --bg: #FAFAF7;
        --bg-card: #FDFCF9;
        --bg-sunken: #F4F2EC;
        --border: #E8E5DD;
        --text-1: #2C2C2A;
        --text-2: #5F5E5A;
        --text-3: #888780;
        --rack-gray: #B4B2A9;
        --success: #1D9E75;
        --success-bg: #E0F1E8;
        --success-text: #0F6E56;
        --info: #378ADD;
        --info-text: #0C447C;
        --warning: #E89E4F;
        --warning-text: #A86B1A;
        --danger: #E24B4A;
        --danger-bg: #FCE8E8;
        --danger-text: #A32D2D;
        --special: #9747FF;
        --special-text: #5F2DAA;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Pretendard",
          system-ui, sans-serif;
        background: var(--bg);
        color: var(--text-1);
        overflow: hidden;
        height: 100vh;
        display: flex;
        flex-direction: column;
        font-size: 13px;
        font-weight: 400;
        font-variant-numeric: tabular-nums;
      }

      /* === Header === */
      .header {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 20px;
        background: var(--bg-card);
        border-bottom: 0.5px solid var(--border);
      }

      .header h1 {
        font-size: 14px;
        font-weight: 500;
        color: var(--text-1);
        letter-spacing: 0.02em;
      }

      .header h1 span {
        color: var(--text-1);
        font-weight: 500;
      }

      .header h1 .bar {
        color: var(--text-3);
        margin: 0 8px;
        font-weight: 400;
      }

      .header-badge {
        font-size: 11px;
        background: var(--bg-sunken);
        color: var(--text-2);
        padding: 3px 8px;
        border-radius: 4px;
        font-weight: 500;
        border: 0.5px solid var(--border);
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .header-nav {
        display: flex;
        gap: 4px;
      }
      .header-nav a {
        color: var(--text-2);
        text-decoration: none;
        font-size: 12px;
        padding: 6px 12px;
        border-radius: 6px;
        border: 0.5px solid transparent;
      }
      .header-nav a:hover {
        color: var(--text-1);
        background: var(--bg-sunken);
      }
      .header-nav a.active {
        color: var(--text-1);
        border-color: var(--border);
        background: var(--bg-sunken);
      }

      /* === Layout === */
      .layout {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
      }

      /* === Steps Bar === */
      .steps-bar {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 20px;
        background: var(--bg-card);
        border-bottom: 0.5px solid var(--border);
      }

      .step {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 12px;
        border-radius: 6px;
        background: transparent;
        cursor: pointer;
        border: 0.5px solid var(--border);
        color: var(--text-2);
      }

      .step:hover {
        background: var(--bg-sunken);
        color: var(--text-1);
      }

      .step.active {
        background: var(--success-bg);
        border-color: var(--success);
        color: var(--success-text);
      }

      .step-num {
        width: 20px;
        height: 20px;
        border-radius: 4px;
        background: var(--bg-sunken);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 500;
        color: var(--text-2);
        border: 0.5px solid var(--border);
      }

      .step.active .step-num {
        background: var(--success);
        color: var(--bg-card);
        border-color: var(--success);
      }

      .step-label {
        font-size: 12px;
        font-weight: 500;
      }

      .step-arrow {
        color: var(--text-3);
        font-size: 14px;
      }

      .steps-nav {
        margin-left: auto;
        display: flex;
        gap: 6px;
      }

      .steps-nav button {
        padding: 6px 12px;
        border: 0.5px solid var(--border);
        border-radius: 6px;
        background: var(--bg-card);
        color: var(--text-2);
        cursor: pointer;
        font-size: 12px;
        font-family: inherit;
      }

      .steps-nav button:hover {
        background: var(--bg-sunken);
        color: var(--text-1);
      }

      /* === 3D Viewport === */
      .viewport {
        flex: 1;
        min-height: 0;
        position: relative;
        background: var(--bg);
      }

      .viewport canvas {
        width: 100%;
        height: 100%;
        display: block;
      }

      .viewport-controls {
        position: absolute;
        bottom: 16px;
        right: 16px;
        display: flex;
        gap: 4px;
        padding: 4px;
        background: var(--bg-card);
        border: 0.5px solid var(--border);
        border-radius: 8px;
      }

      .viewport-controls button {
        padding: 6px 10px;
        border: 0.5px solid transparent;
        border-radius: 4px;
        background: transparent;
        color: var(--text-2);
        cursor: pointer;
        font-size: 11px;
        font-weight: 500;
        font-family: inherit;
      }

      .viewport-controls button:hover {
        background: var(--bg-sunken);
        color: var(--text-1);
      }

      .viewport-controls button.active-toggle {
        background: var(--success-bg);
        border-color: var(--success);
        color: var(--success-text);
      }

      /* === Right Panel === */
      .panel {
        background: var(--bg-card);
        border-left: 0.5px solid var(--border);
        overflow-y: auto;
        display: flex;
        flex-direction: column;
      }

      .panel-section {
        padding: 12px 14px;
        border-bottom: 0.5px solid var(--border);
      }

      .panel-section h3 {
        font-size: 11px;
        font-weight: 500;
        color: var(--text-2);
        margin-bottom: 12px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      /* Score bars */
      .score-row {
        display: flex;
        align-items: center;
        margin-bottom: 8px;
        gap: 8px;
      }

      .score-label {
        font-size: 11px;
        color: var(--text-2);
        width: 75px;
        flex-shrink: 0;
      }

      .score-bar-bg {
        flex: 1;
        height: 6px;
        background: var(--bg-sunken);
        border-radius: 4px;
        overflow: hidden;
      }

      .score-bar {
        height: 100%;
        border-radius: 4px;
        transition: width 0.6s ease, background-color 0.4s;
        width: 0%;
      }

      .score-value {
        font-size: 12px;
        font-weight: 500;
        width: 30px;
        text-align: right;
        color: var(--text-1);
      }

      .score-row.total {
        margin-bottom: 14px;
        padding-bottom: 10px;
        border-bottom: 0.5px solid var(--border);
      }

      .score-row.total .score-label {
        font-weight: 500;
        color: var(--text-1);
        font-size: 12px;
      }

      .score-row.total .score-bar-bg {
        height: 8px;
      }

      .score-row.total .score-value {
        font-size: 13px;
        color: var(--text-1);
      }

      /* Scene Graph Panel */
      .sg-room {
        font-size: 11px;
        color: var(--text-2);
        margin-bottom: 10px;
        padding: 6px 10px;
        background: var(--bg-sunken);
        border-radius: 4px;
      }

      .sg-nodes {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .sg-node {
        background: var(--bg-card);
        border: 0.5px solid var(--border);
        border-radius: 6px;
        padding: 8px 10px;
        font-size: 11px;
      }

      .sg-node-header {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 4px;
        color: var(--text-1);
      }

      .sg-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      .sg-id {
        color: var(--text-3);
        font-size: 10px;
        margin-left: auto;
      }

      .sg-pos {
        color: var(--text-3);
        font-size: 10px;
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        margin-bottom: 2px;
      }

      .sg-heat {
        color: var(--danger-text);
        font-size: 10px;
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        margin-bottom: 4px;
      }

      .sg-rels {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
      }

      /* Chart */
      .chart-container {
        padding: 12px 14px;
        flex: 1;
        min-height: 0;
      }

      .chart-container h3 {
        font-size: 11px;
        font-weight: 500;
        color: var(--text-2);
        margin-bottom: 10px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .chart-wrapper {
        width: 100%;
        height: 180px;
      }

      .chart-wrapper canvas {
        width: 100%;
        height: 100%;
        border-radius: 6px;
      }

      /* === Simulation Timeline === */
      .sim-bar {
        grid-column: 1 / -1;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 16px;
        background: var(--bg-card);
        border-top: 0.5px solid var(--border);
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 10;
      }

      .sim-bar .sim-label {
        font-size: 10px;
        color: var(--text-2);
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        white-space: nowrap;
      }

      .sim-play {
        width: 26px;
        height: 26px;
        border-radius: 6px;
        border: 0.5px solid var(--border);
        background: var(--bg-card);
        color: var(--text-1);
        font-size: 11px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .sim-play:hover {
        background: var(--bg-sunken);
      }

      .sim-slider-wrap {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 2px;
        min-width: 0;
      }

      .sim-time-labels {
        display: flex;
        justify-content: space-between;
        font-size: 9px;
        color: var(--text-3);
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        padding: 0 2px;
      }

      .sim-slider {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 4px;
        border-radius: 2px;
        background: var(--bg-sunken);
        outline: none;
        cursor: pointer;
      }

      .sim-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--text-1);
        cursor: pointer;
        border: 1.5px solid var(--bg-card);
      }

      .sim-slider::-moz-range-thumb {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--text-1);
        cursor: pointer;
        border: 1.5px solid var(--bg-card);
      }

      .sim-clock {
        font-size: 14px;
        font-weight: 500;
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        color: var(--text-1);
        min-width: 50px;
        text-align: center;
        flex-shrink: 0;
      }

      .sim-speed {
        font-size: 10px;
        color: var(--text-2);
        background: var(--bg-card);
        border: 0.5px solid var(--border);
        border-radius: 4px;
        padding: 3px 8px;
        cursor: pointer;
        flex-shrink: 0;
        font-family: inherit;
      }

      .sim-speed:hover {
        background: var(--bg-sunken);
        color: var(--text-1);
      }

      /* === Real-time Monitor Panel === */
      .monitor-section {
        padding: 12px 14px;
        border-bottom: 0.5px solid var(--border);
      }

      .monitor-section h3 {
        font-size: 11px;
        font-weight: 500;
        color: var(--text-2);
        margin-bottom: 10px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .monitor-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .monitor-card {
        background: var(--bg-card);
        border: 0.5px solid var(--border);
        border-radius: 6px;
        padding: 10px;
      }

      .monitor-card .mon-label {
        font-size: 10px;
        color: var(--text-2);
        margin-bottom: 4px;
      }

      .monitor-card .mon-value {
        font-size: 22px;
        font-weight: 500;
        font-variant-numeric: tabular-nums;
        color: var(--text-1);
      }

      .monitor-card .mon-unit {
        font-size: 11px;
        color: var(--text-3);
        margin-left: 2px;
        font-weight: 400;
      }

      .mon-value.temp-ok { color: var(--success-text); }
      .mon-value.temp-warn { color: var(--warning-text); }
      .mon-value.temp-danger { color: var(--danger-text); }

      .load-bar-bg {
        width: 100%;
        height: 4px;
        background: var(--bg-sunken);
        border-radius: 2px;
        margin-top: 6px;
        overflow: hidden;
      }

      .load-bar {
        height: 100%;
        border-radius: 2px;
        transition: width 0.3s ease, background-color 0.3s;
      }

      .airflow-legend {
        position: absolute;
        top: 16px;
        left: 16px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        background: var(--bg-card);
        padding: 10px 12px;
        border-radius: 6px;
        border: 0.5px solid var(--border);
        z-index: 10;
        font-size: 11px;
        color: var(--text-2);
      }

      .af-legend-item {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .af-legend-box {
        width: 12px;
        height: 12px;
        border-radius: 3px;
        border: 0.5px solid;
        flex-shrink: 0;
      }

      /* === Step 4: Real Scan Upload Panel === */
      .scan-upload-panel {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: var(--bg-card);
        border: 0.5px solid var(--border);
        border-radius: 10px;
        padding: 20px 24px;
        z-index: 20;
        min-width: 360px;
        display: none;
      }
      .scan-upload-panel h3 {
        font-size: 12px; font-weight: 500; color: var(--text-2);
        margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.06em;
      }
      .scan-upload-panel label {
        display: block; font-size: 11px; color: var(--text-2); margin-bottom: 4px;
      }
      .scan-upload-panel input[type="file"],
      .scan-upload-panel textarea {
        width: 100%; margin-bottom: 12px; padding: 8px 10px;
        background: var(--bg); border: 0.5px solid var(--border); border-radius: 6px;
        color: var(--text-1); font-size: 12px;
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
      }
      .scan-upload-panel textarea { height: 100px; resize: vertical; }
      .scan-upload-panel .scan-btn-row {
        display: flex; gap: 6px; margin-top: 4px;
      }
      .scan-upload-panel button {
        flex: 1; padding: 8px 12px;
        border: 0.5px solid var(--border); border-radius: 6px;
        background: var(--bg-card); color: var(--text-1); cursor: pointer;
        font-size: 12px; font-family: inherit; font-weight: 500;
      }
      .scan-upload-panel button:hover {
        background: var(--bg-sunken);
      }
      .scan-upload-panel button.primary {
        background: var(--text-1); color: var(--bg-card); border-color: var(--text-1);
      }
      .scan-upload-panel button.primary:hover {
        background: #1a1a18;
      }
      .scan-upload-panel button:disabled {
        opacity: 0.4; cursor: not-allowed;
      }
      .scan-upload-panel .scan-status {
        font-size: 11px; color: var(--text-2); margin-top: 10px; min-height: 16px;
      }
      .scan-upload-panel .scan-status.error { color: var(--danger-text); }

      /* Voxel layer slider */
      .voxel-controls {
        position: absolute; top: 16px; right: 16px;
        background: var(--bg-card);
        padding: 10px 12px; border-radius: 6px; border: 0.5px solid var(--border);
        z-index: 10; display: none; min-width: 180px;
      }
      .voxel-controls label { font-size: 10px; color: var(--text-2); display: block; margin-bottom: 4px; }
      .voxel-controls input[type="range"] {
        width: 100%; -webkit-appearance: none; height: 4px; background: var(--bg-sunken);
        border-radius: 2px; outline: none;
      }
      .voxel-controls input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none; width: 12px; height: 12px;
        border-radius: 50%; background: var(--text-1); cursor: pointer;
      }
      .voxel-controls .vc-value {
        font-size: 11px; color: var(--text-1);
        font-family: ui-monospace, "SF Mono", Menlo, monospace; text-align: right;
      }

    </style>
  </head>
  <body>
    <!-- Header -->
    <div class="header">
      <h1><span>HALO</span><span class="bar">|</span>Heat-Aware Layout Optimizer</h1>
      <div class="header-right">
        <nav class="header-nav">
          <a href="./index.html" class="active">시나리오</a>
          <a href="./components.html">컴포넌트</a>
          <a href="./dashboard.html">대시보드</a>
          <a href="./scan.html">스캔</a>
        </nav>
      </div>
    </div>

    <div class="layout">
      <!-- Steps -->
      <div class="steps-bar">
        <div class="step active">
          <div class="step-num">1</div>
          <span class="step-label">Random</span>
        </div>
        <span class="step-arrow">&rarr;</span>
        <div class="step">
          <div class="step-num">2</div>
          <span class="step-label">RL (PPO)</span>
        </div>
        <span class="step-arrow">&rarr;</span>
        <div class="step">
          <div class="step-num">3</div>
          <span class="step-label">Real Scan</span>
        </div>

        <div class="steps-nav">
          <button type="button" id="btn-prev">&larr; Prev</button>
          <button type="button" id="btn-next">Next &rarr;</button>
        </div>
      </div>

      <!-- 3D Viewport -->
      <div class="viewport" style="position:relative;">
        <canvas id="canvas"></canvas>

        <!-- Scan Upload Panel (Step 4) -->
        <div class="scan-upload-panel" id="scan-upload-panel">
          <h3>Upload Room Scan</h3>
          <label for="scan-obj-file">.OBJ Mesh File</label>
          <input type="file" id="scan-obj-file" accept=".obj" />
          <label for="scan-metadata">Equipment Metadata (JSON)</label>
          <textarea id="scan-metadata" placeholder='{"racks":[], "cooling_units":[]}'>{}</textarea>
          <div class="scan-btn-row">
            <button type="button" class="primary" id="scan-upload-btn">Upload &amp; Analyze</button>
            <button type="button" id="scan-demo-btn">Load Demo</button>
          </div>
          <div class="scan-status" id="scan-status"></div>
        </div>

        <!-- Voxel Controls (Step 4 active) -->
        <div class="voxel-controls" id="voxel-controls">
          <label>Z-Layer Slice</label>
          <input type="range" id="voxel-z-slider" min="0" max="60" value="60" step="1" />
          <div class="vc-value" id="voxel-z-value">All</div>
          <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;">
            <button type="button" id="vc-semantic" style="flex:1;padding:4px 8px;font-size:10px;border:0.5px solid var(--border);border-radius:4px;background:var(--bg-card);color:var(--text-2);cursor:pointer;font-family:inherit;">Semantic</button>
            <button type="button" id="vc-thermal" style="flex:1;padding:4px 8px;font-size:10px;border:0.5px solid var(--border);border-radius:4px;background:var(--bg-card);color:var(--text-2);cursor:pointer;font-family:inherit;">Thermal</button>
            <button type="button" id="vc-airflow" style="flex:1;padding:4px 8px;font-size:10px;border:0.5px solid var(--border);border-radius:4px;background:var(--bg-card);color:var(--text-2);cursor:pointer;font-family:inherit;">Airflow</button>
          </div>
        </div>

        <!-- Airflow Zone Legend -->
        <div class="airflow-legend" id="airflow-legend" style="display:none;">
          <span class="af-legend-item">
            <span class="af-legend-box" style="background:rgba(55,138,221,0.18);border-color:#378ADD;"></span>
            Cold Air Zone
          </span>
          <span class="af-legend-item">
            <span class="af-legend-box" style="background:rgba(232,158,79,0.20);border-color:#E89E4F;"></span>
            Hot Air Zone
          </span>
          <span class="af-legend-item">
            <span class="af-legend-box" style="background:rgba(226,75,74,0.20);border-color:#E24B4A;"></span>
            Recirculation
          </span>
        </div>

        <div class="viewport-controls" style="bottom: 56px;">
          <button type="button" id="btn-heatmap">Heatmap</button>
          <button type="button" id="btn-airflow">Airflow</button>
          <button type="button" id="btn-zones">Zones</button>
        </div>

        <!-- Simulation Timeline -->
        <div class="sim-bar">
          <span class="sim-label">SIM</span>
          <button type="button" class="sim-play" id="sim-play" title="Play/Pause">&#9654;</button>
          <div class="sim-slider-wrap">
            <input type="range" class="sim-slider" id="sim-slider" min="0" max="1440" value="0" step="1" />
            <div class="sim-time-labels">
              <span>0:00</span><span>6:00</span><span>12:00</span><span>18:00</span><span>24:00</span>
            </div>
          </div>
          <div class="sim-clock" id="sim-clock">00:00</div>
